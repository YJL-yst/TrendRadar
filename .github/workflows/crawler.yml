name: 热点与复盘推送

on:
  workflow_dispatch:
  schedule:
    - cron: 0 12 * * *  # 北京时间 20:00 晚间复盘推送
  push:
    branches: [ main ]

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas tushare

      - name: 运行爬虫脚本
        run: python crawler.py
        env:
          WECOM_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK_URL }}
